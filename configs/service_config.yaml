device: "auto"

detector:
  model_path: "models/grounding-dino"
  local_files_only: true
  text_prompt: "a train"
  box_threshold: 0.2
  text_threshold: 0.2
  nms_iou_threshold: 0.5
  min_box_score: 0.0
  max_detections: 3

crop:
  padding_ratio: 0.04
  select_policy: "all"
  fallback_policy: "whole_image"

classifier:
  model_dir: "models/wakareeru-0.1.0-alpha.1"
  local_files_only: true
  top_k: 5

postprocess:
  confusion_groups: []
